<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<title>Workout</title>
<link rel="stylesheet" href="./css/styles.css">
</head>
<body>

<header class="topbar">
  <a class="back" href="./index.html" aria-label="Back">‹</a>
  <h1 id="title">Workout</h1>
  <button class="week-pill" id="weekPill" aria-label="Change week">W1</button>
</header>

<div class="mode-banner">
  <button class="mode-toggle" id="modeBtn" aria-label="Toggle workout mode">
    <span class="mode-toggle-left">
      <span class="mode-toggle-title">Workout Mode</span>
      <span class="mode-toggle-sub" id="modeSubtext">Auto rest timer &amp; set logging</span>
    </span>
    <span class="mode-toggle-pill" id="modePill">OFF</span>
  </button>
</div>

<main class="container" id="content"></main>

<div class="timer-bar hidden" id="timerBar">
  <div class="timer-track"><div class="timer-fill" id="timerFill"></div></div>
  <div class="timer-body">
    <div class="timer-info">
      <div class="timer-label" id="timerLabel">Rest</div>
      <div class="timer-display" id="timerDisplay">0:00</div>
    </div>
    <div class="timer-actions">
      <button class="timer-btn" id="timerToggle" aria-label="Pause or resume timer">▶</button>
      <button class="timer-btn timer-cancel" id="timerCancel" aria-label="Cancel timer">✕</button>
    </div>
  </div>
</div>

<script type="module" src="./js/workout.js"></script>
</body>
</html>
